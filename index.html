<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#f7f2e7">
<title>일진 다이어리</title>
<style>
  :root {
    --ink: #3a3326;
    --ink-soft: #8a7d65;
    --ink-faint: #b8ab8f;
    --paper: #f7f2e7;
    --paper-deep: #efe7d6;
    --paper-card: #fbf8f0;
    --vermilion: #b8462f;
    --vermilion-soft: #c9785f;
    --vermilion-pale: #e8d4cc;
    --gold: #a8843f;
    --line: rgba(58,51,38,0.10);
    --line-strong: rgba(58,51,38,0.18);
    --shadow: rgba(58,51,38,0.10);

    /* 오행 색상 */
    --wx-wood: #2f6b52;
    --wx-fire: #b8462f;
    --wx-earth: #a8843f;
    --wx-metal: #7d7568;
    --wx-water: #1a1814;
  }

  .wx-목 { color: var(--wx-wood) !important; }
  .wx-화 { color: var(--wx-fire) !important; }
  .wx-토 { color: var(--wx-earth) !important; }
  .wx-금 { color: var(--wx-metal) !important; }
  .wx-수 { color: var(--wx-water) !important; }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: var(--paper);
    color: var(--ink);
    font-family: 'Noto Serif KR', 'Nanum Myeongjo', serif;
    overscroll-behavior-y: none;
  }

  body {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    background-image:
      radial-gradient(circle at 12% 6%, rgba(168,132,63,0.05), transparent 38%),
      radial-gradient(circle at 88% 94%, rgba(184,70,47,0.04), transparent 42%);
  }

  .pretendard { font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif; }

  /* ===== Tabs ===== */
  .tabbar {
    flex-shrink: 0;
    display: flex;
    padding: max(14px, env(safe-area-inset-top)) 16px 0;
    gap: 4px;
    border-bottom: 1px solid var(--line);
    background: var(--paper);
  }
  .tab-btn {
    flex: 1;
    background: none;
    border: none;
    padding: 10px 4px 12px;
    font-size: 13px;
    color: var(--ink-soft);
    font-family: 'Pretendard', -apple-system, sans-serif;
    letter-spacing: 0.02em;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    position: relative;
    top: 1px;
  }
  .tab-btn.active {
    color: var(--vermilion);
    border-bottom-color: var(--vermilion);
    font-weight: 600;
  }

  .view { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; display: none; }
  .view.active { display: block; }

  /* ===== Header: 일진 카드 ===== */
  .header {
    flex-shrink: 0;
    padding: 18px 20px 16px;
    border-bottom: 1px solid var(--line);
    position: relative;
  }

  .top-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 12px;
  }

  .date-block .greg {
    font-size: 13px;
    color: var(--ink-soft);
    letter-spacing: 0.04em;
    font-family: 'Pretendard', -apple-system, sans-serif;
  }
  .date-block .lunar {
    font-size: 12px;
    color: var(--ink-faint);
    margin-top: 2px;
    font-family: 'Pretendard', -apple-system, sans-serif;
  }

  .ganzhi-stage {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 26px;
    padding: 12px 0 4px;
  }
  .ganzhi-pillar { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .hanja {
    font-size: 52px;
    line-height: 1;
    font-weight: 600;
    color: var(--vermilion);
  }
  .hanja.zhi { color: var(--ink); }
  .label-kr { font-size: 11px; color: var(--ink-soft); letter-spacing: 0.14em; font-family: 'Pretendard', sans-serif; }
  .ganzhi-divider { width: 1px; height: 46px; background: var(--line-strong); }

  .element-row {
    text-align: center;
    margin-top: 8px;
    font-size: 11.5px;
    color: var(--ink-soft);
    letter-spacing: 0.06em;
    font-family: 'Pretendard', sans-serif;
  }
  .element-row .tag {
    display: inline-block;
    padding: 3px 10px;
    border: 1px solid var(--line-strong);
    border-radius: 12px;
    margin: 0 3px;
    background: var(--paper-card);
  }

  .nav-arrows { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }
  .nav-btn {
    background: none; border: none; color: var(--ink-soft); font-size: 12.5px;
    padding: 6px 10px; cursor: pointer; font-family: 'Pretendard', sans-serif;
  }
  .nav-btn.today-btn { color: var(--gold); }

  /* ===== 합충형 관계 카드 ===== */
  .relation-card {
    margin: 14px 20px 0;
    padding: 14px 16px;
    background: var(--paper-card);
    border: 1px solid var(--line);
    border-radius: 12px;
  }
  .relation-card.empty {
    text-align: center;
    color: var(--ink-faint);
    font-size: 12.5px;
    font-family: 'Pretendard', sans-serif;
    padding: 16px;
  }
  .relation-title {
    font-size: 11px;
    color: var(--ink-soft);
    letter-spacing: 0.1em;
    margin-bottom: 10px;
    font-family: 'Pretendard', sans-serif;
    display: flex;
    justify-content: space-between;
  }
  .relation-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 0;
    font-size: 13px;
  }
  .relation-pillar {
    font-size: 11px;
    color: var(--ink-soft);
    font-family: 'Pretendard', sans-serif;
    min-width: 36px;
  }
  .relation-tag {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 8px;
    font-family: 'Pretendard', sans-serif;
    font-weight: 600;
  }
  .relation-tag.합 { background: var(--vermilion-pale); color: var(--vermilion); }
  .relation-tag.충 { background: #e2e2e2; color: #5a5347; }
  .relation-tag.형, .relation-tag.파, .relation-tag.해 { background: #ece0c8; color: var(--gold); }
  .relation-detail { color: var(--ink); }
  .no-saju-prompt {
    text-align: center;
    padding: 10px;
    font-size: 12.5px;
    color: var(--ink-soft);
    font-family: 'Pretendard', sans-serif;
  }
  .no-saju-prompt button {
    display: block;
    margin: 10px auto 0;
    background: var(--vermilion);
    color: var(--paper-card);
    border: none;
    border-radius: 8px;
    padding: 9px 18px;
    font-size: 12.5px;
    font-family: 'Pretendard', sans-serif;
    cursor: pointer;
  }

  /* ===== 내 사주 미니 카드 (오늘 일진 화면) ===== */
  .my-saju-mini {
    margin: 14px 20px 0;
    padding: 12px 16px;
    background: var(--paper-card);
    border: 1px solid var(--line);
    border-radius: 12px;
  }
  .my-saju-mini-title {
    font-size: 11px;
    color: var(--ink-soft);
    letter-spacing: 0.1em;
    margin-bottom: 10px;
    font-family: 'Pretendard', sans-serif;
  }
  .my-saju-mini-grid {
    display: grid;
    grid-template-columns: repeat(4,1fr);
    gap: 6px;
  }
  .my-saju-mini-col { text-align: center; }
  .my-saju-mini-label {
    font-size: 10px;
    color: var(--ink-faint);
    font-family: 'Pretendard', sans-serif;
    margin-bottom: 4px;
  }
  .my-saju-mini-gan { font-size: 19px; line-height: 1.25; }
  .my-saju-mini-zhi { font-size: 19px; line-height: 1.25; }

  /* ===== Memo Section ===== */
  .memo-area { padding: 16px 20px calc(20px + env(safe-area-inset-bottom)); }
  .memo-area-inner { max-width: 640px; margin: 0 auto; }
  .memo-label {
    font-size: 12px; color: var(--ink-soft); letter-spacing: 0.1em; margin-bottom: 8px;
    font-family: 'Pretendard', sans-serif; display: flex; justify-content: space-between; align-items: center;
  }
  .char-count { font-size: 11px; color: var(--ink-faint); }

  textarea#memo {
    width: 100%; min-height: 170px;
    background: var(--paper-card);
    border: 1px solid var(--line-strong);
    border-radius: 10px;
    padding: 14px;
    font-size: 16px;
    line-height: 1.7;
    color: var(--ink);
    font-family: 'Noto Serif KR', 'Nanum Myeongjo', serif;
    resize: vertical;
    outline: none;
  }
  textarea#memo:focus { border-color: var(--vermilion-soft); }

  .save-indicator {
    text-align: center; font-size: 11px; color: var(--ink-soft);
    opacity: 0; transition: opacity 0.3s; margin-top: 8px;
    font-family: 'Pretendard', sans-serif; letter-spacing: 0.05em;
  }
  .save-indicator.show { opacity: 0.8; }

  .history-section { margin-top: 26px; }
  .history-title { font-size: 12px; color: var(--ink-soft); letter-spacing: 0.1em; margin-bottom: 10px; font-family: 'Pretendard', sans-serif; }
  .history-item { padding: 12px 0; border-bottom: 1px solid var(--line); cursor: pointer; }
  .history-item:active { opacity: 0.6; }
  .history-row1 { display: flex; justify-content: space-between; align-items: baseline; font-family: 'Pretendard', sans-serif; }
  .history-date { font-size: 12px; color: var(--ink-soft); }
  .history-ganzhi { font-size: 13px; color: var(--vermilion); font-weight: 600; }
  .history-text {
    font-size: 14px; color: var(--ink); margin-top: 4px; line-height: 1.5;
    overflow: hidden; text-overflow: ellipsis; display: -webkit-box;
    -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  }
  .history-empty { text-align: center; color: var(--ink-faint); font-size: 13px; padding: 30px 0; font-family: 'Pretendard', sans-serif; }

  /* ===== 만세력(내 사주) 입력 화면 ===== */
  .myeongli-area { padding: 20px 20px calc(20px + env(safe-area-inset-bottom)); max-width: 640px; margin: 0 auto; }
  .section-title {
    font-size: 13px; color: var(--ink); font-weight: 600; letter-spacing: 0.02em;
    margin-bottom: 4px; font-family: 'Pretendard', sans-serif;
  }
  .section-sub { font-size: 12px; color: var(--ink-faint); margin-bottom: 18px; font-family: 'Pretendard', sans-serif; }

  .form-group { margin-bottom: 16px; }
  .form-label { font-size: 12px; color: var(--ink-soft); margin-bottom: 6px; font-family: 'Pretendard', sans-serif; }
  .form-row { display: flex; gap: 8px; }
  .form-row > * { flex: 1; }

  input[type="number"], select {
    width: 100%;
    background: var(--paper-card);
    border: 1px solid var(--line-strong);
    border-radius: 8px;
    padding: 11px 10px;
    font-size: 15px;
    color: var(--ink);
    font-family: 'Pretendard', sans-serif;
    outline: none;
    -webkit-appearance: none;
    appearance: none;
  }
  input[type="number"]:focus, select:focus { border-color: var(--vermilion-soft); }

  .toggle-row { display: flex; gap: 8px; margin-bottom: 16px; }
  .toggle-btn {
    flex: 1;
    background: var(--paper-card);
    border: 1px solid var(--line-strong);
    border-radius: 8px;
    padding: 10px;
    font-size: 13px;
    color: var(--ink-soft);
    font-family: 'Pretendard', sans-serif;
    cursor: pointer;
  }
  .toggle-btn.active { background: var(--vermilion); color: var(--paper-card); border-color: var(--vermilion); font-weight: 600; }

  .time-unknown-row {
    display: flex; align-items: center; gap: 8px; margin-top: 8px;
    font-size: 12.5px; color: var(--ink-soft); font-family: 'Pretendard', sans-serif;
  }
  .time-unknown-row input[type="checkbox"] { width: 16px; height: 16px; accent-color: var(--vermilion); }

  .submit-btn {
    width: 100%;
    background: var(--vermilion);
    color: var(--paper-card);
    border: none;
    border-radius: 10px;
    padding: 14px;
    font-size: 15px;
    font-weight: 600;
    font-family: 'Pretendard', sans-serif;
    cursor: pointer;
    margin-top: 8px;
  }
  .submit-btn:active { opacity: 0.85; }

  .saved-saju-card {
    background: var(--paper-card);
    border: 1px solid var(--line-strong);
    border-radius: 12px;
    padding: 18px;
    margin-bottom: 20px;
  }
  .saved-saju-title {
    font-size: 12px; color: var(--ink-soft); letter-spacing: 0.08em;
    margin-bottom: 12px; font-family: 'Pretendard', sans-serif;
    display: flex; justify-content: space-between; align-items: center;
  }
  .saved-saju-title button {
    background: none; border: none; color: var(--vermilion); font-size: 11.5px;
    font-family: 'Pretendard', sans-serif; cursor: pointer; padding: 4px 0;
  }
  .pillars-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; }
  .pillar-col { text-align: center; }
  .pillar-col-label { font-size: 10.5px; color: var(--ink-faint); font-family: 'Pretendard', sans-serif; margin-bottom: 6px; }
  .pillar-col-gan { font-size: 24px; line-height: 1.3; }
  .pillar-col-zhi { font-size: 24px; line-height: 1.3; }
  .saved-saju-meta { margin-top: 12px; font-size: 11.5px; color: var(--ink-faint); text-align: center; font-family: 'Pretendard', sans-serif; }

  .error-msg {
    color: var(--vermilion); font-size: 12px; margin-top: 6px;
    font-family: 'Pretendard', sans-serif; display: none;
  }
  .error-msg.show { display: block; }
</style>
</head>
<body>

<div class="tabbar">
  <button class="tab-btn active" data-view="today">오늘 일진</button>
  <button class="tab-btn" data-view="myeongli">내 만세력</button>
</div>

<!-- ===== 오늘 일진 뷰 ===== -->
<div class="view active" id="view-today">
  <div class="header">
    <div class="top-row">
      <div class="date-block">
        <div class="greg" id="gregDate">-</div>
        <div class="lunar" id="lunarDate">-</div>
      </div>
    </div>

    <div class="ganzhi-stage">
      <div class="ganzhi-pillar">
        <div class="hanja gan" id="ganChar">-</div>
        <div class="label-kr" id="ganLabel">일간</div>
      </div>
      <div class="ganzhi-divider"></div>
      <div class="ganzhi-pillar">
        <div class="hanja zhi" id="zhiChar">-</div>
        <div class="label-kr" id="zhiLabel">일지</div>
      </div>
    </div>

    <div class="element-row">
      <span class="tag" id="ganElement">-</span>
      <span class="tag" id="zhiElement">-</span>
    </div>

    <div class="nav-arrows">
      <button class="nav-btn" id="prevBtn">‹ 어제</button>
      <button class="nav-btn today-btn" id="todayBtn">오늘로</button>
      <button class="nav-btn" id="nextBtn">내일 ›</button>
    </div>
  </div>

  <div id="mySajuMiniCard"></div>
  <div id="relationCard"></div>

  <div class="memo-area">
    <div class="memo-area-inner">
      <div class="memo-label">
        <span>오늘의 메모</span>
        <span class="char-count" id="charCount">0자</span>
      </div>
      <textarea id="memo" placeholder="오늘 일진에 대한 생각이나 메모를 남긴다."></textarea>
      <div class="save-indicator" id="saveIndicator">저장됨</div>

      <div class="history-section">
        <div class="history-title">최근 기록</div>
        <div id="historyList"></div>
      </div>
    </div>
  </div>
</div>

<!-- ===== 내 만세력 뷰 ===== -->
<div class="view" id="view-myeongli">
  <div class="myeongli-area">
    <div id="myeongliContent"></div>
  </div>
</div>

const BASE_DATE_UTC = Date.UTC(2026, 0, 1);

function dateToUTCms(y,m,d) { return Date.UTC(y, m-1, d); }

function getDayGanZhiIndex(y, m, d) {
  const diffDays = Math.round((dateToUTCms(y,m,d) - BASE_DATE_UTC) / DAY_MS);

  if (idx < 0) idx += 60;
  return idx;

function kstToUtcMs(y,m,d,h,mi,s) {
  return Date.UTC(y,m-1,d,h,mi,s||0) - 9*3600*1000;
}

function bisectRight(arr, utcMs) {
  let lo = 0, hi = arr.length - 1, ans = -1;
  while (lo <= hi) {
    const mid = (lo+hi) >> 1;
    if (arr[mid] <= utcMs) { ans = mid; lo = mid+1; }
    else hi = mid-1;
  }
  return ans;

function calcEightChar(y, m, d, h, mi) {

function jdToGregorian(jd) {
  const Z = jd;
  let A;
  if (Z < 2299161) A = Z;
  else {
    const alpha = Math.floor((Z - 1867216.25) / 36524.25);
    A = Z + 1 + alpha - Math.floor(alpha/4);

  const E = Math.floor((B - D) / 30.6001);
  const day = B - D - Math.floor(30.6001*E);
  const month = E < 14 ? E-1 : E-13;
  const year = month > 2 ? C-4716 : C-4715;
  return { year, month, day };
}

function lunarToSolar(lunarYear, lunarMonth, lunarDay, isLeap) {
  const row = LUNAR_TABLE.find(r => r[0] === lunarYear);
  if (!row) throw new Error('지원 범위(1900~2100)를 벗어난 음력 연도다');
  const firstJD = row[1], leapMonth = row[2], monthCount = row[3], bitmask = row[4];

  let idx;
  if (isLeap) {
    if (leapMonth === 0 || lunarMonth !== leapMonth) {
      throw new Error(`${lunarYear}년에는 윤${lunarMonth}월이 존재하지 않는다`);
    }
    idx = leapMonth;
  } else {
    idx = lunarMonth - 1;
    if (leapMonth !== 0 && lunarMonth > leapMonth) idx += 1;
  }
  if (idx < 0 || idx >= monthCount) throw new Error('유효하지 않은 음력 월이다');
  if (lunarDay < 1 || lunarDay > 30) throw new Error('유효하지 않은 음력 일이다');

  let cumDays = 0;
  for (let i = 0; i < idx; i++) {
    cumDays += ((bitmask >> i) & 1) ? 30 : 29;
  }
  const monthDayCount = ((bitmask >> idx) & 1) ? 30 : 29;
  if (lunarDay > monthDayCount) throw new Error('해당 음력월은 그만큼의 일수가 없다');

  const targetJD = firstJD + cumDays + (lunarDay - 1);
  return jdToGregorian(targetJD);
}

// ===== 합충형 =====
const GAN_HAP = { '0-5':'토','5-0':'토','1-6':'금','6-1':'금','2-7':'수','7-2':'수','3-8':'목','8-3':'목','4-9':'화','9-4':'화' };
const ZHI_YUKHAP = { '0-1':'토','1-0':'토','2-11':'목','11-2':'목','3-10':'화','10-3':'화','4-9':'금','9-4':'금','5-8':'수','8-5':'수','6-7':'화','7-6':'화' };
const ZHI_CHUNG = { '0-6':1,'6-0':1,'1-7':1,'7-1':1,'2-8':1,'8-2':1,'3-9':1,'9-3':1,'4-10':1,'10-4':1,'5-11':1,'11-5':1 };
const ZHI_HYEONG = { '2-5':'형','5-8':'형','8-2':'형','1-10':'형','10-7':'형','7-1':'형','0-3':'형','3-0':'형','4-4':'자형','6-6':'자형','9-9':'자형','11-11':'자형' };
const ZHI_PA = { '0-9':1,'9-0':1,'1-4':1,'4-1':1,'2-11':1,'11-2':1,'3-6':1,'6-3':1,'5-8':1,'8-5':1,'10-7':1,'7-10':1 };
const ZHI_HAE = { '0-7':1,'7-0':1,'1-6':1,'6-1':1,'2-5':1,'5-2':1,'3-4':1,'4-3':1,'8-11':1,'11-8':1,'9-10':1,'10-9':1 };

function pairKey(a,b){ return a+'-'+b; }

function compareTwoPillars(ganA, zhiA, ganB, zhiB) {
  const results = [];
  const gk = pairKey(ganA, ganB);
  if (GAN_HAP[gk]) {
    const lo=Math.min(ganA,ganB), hi=Math.max(ganA,ganB);
    results.push({type:'합', detail:`${GAN[lo]}${GAN[hi]} 천간합(${GAN_HAP[gk]})`});
  }
  const zk = pairKey(zhiA, zhiB);
  if (ZHI_YUKHAP[zk]) {
    const lo=Math.min(zhiA,zhiB), hi=Math.max(zhiA,zhiB);
    results.push({type:'합', detail:`${ZHI[lo]}${ZHI[hi]} 지지합(${ZHI_YUKHAP[zk]})`});
  }
  if (ZHI_CHUNG[zk]) {
    const lo=Math.min(zhiA,zhiB), hi=Math.max(zhiA,zhiB);
    results.push({type:'충', detail:`${ZHI[lo]}${ZHI[hi]} 충`});
  }
  if (ZHI_HYEONG[zk]) results.push({type:'형', detail:`${ZHI[zhiA]}${ZHI[zhiB]} ${ZHI_HYEONG[zk]}`});
  if (ZHI_PA[zk]) {
    const lo=Math.min(zhiA,zhiB), hi=Math.max(zhiA,zhiB);
    results.push({type:'파', detail:`${ZHI[lo]}${ZHI[hi]} 파`});
  }
  if (ZHI_HAE[zk]) {
    const lo=Math.min(zhiA,zhiB), hi=Math.max(zhiA,zhiB);
    results.push({type:'해', detail:`${ZHI[lo]}${ZHI[hi]} 해`});
  }
  return results;
}

function analyzeRelations(userPillars, todayGanIdx, todayZhiIdx) {
  const labels = {year:'년주', month:'월주', day:'일주', time:'시주'};
  const out = [];
  for (const key of ['time','day','month','year']) {
    if (!userPillars[key]) continue;
    const { gan, zhi } = userPillars[key];
    const rels = compareTwoPillars(gan, zhi, todayGanIdx, todayZhiIdx);
    if (rels.length > 0) out.push({ pillar: labels[key], relations: rels });
  }
  return out;
}

        const ec = calcEightChar(solarY, solarM, solarD, h, mi);
        const pillars = {
          year: {gan: ec.year.gan, zhi: ec.year.zhi},
          month: {gan: ec.month.gan, zhi: ec.month.zhi},
          day: {gan: ec.day.gan, zhi: ec.day.zhi},
        };
        if (!timeUnknown) pillars.time = {gan: ec.time.gan, zhi: ec.time.zhi};

        const metaStr = calendarType === 'lunar'
          ? `음력 ${y}.${m}.${d}${isLeap?'(윤)':''} 입력 · 양력 ${solarY}.${solarM}.${solarD} 환산${timeUnknown ? ' · 시간 미상' : ` ${h}시${mi}분`}`
          : `양력 ${y}.${m}.${d}${timeUnknown ? ' · 시간 미상' : ` ${h}시${mi}분`}`;

        mySaju = { pillars, meta: metaStr };
        saveSaju(mySaju);
        renderSavedSajuView();
        render(); // 오늘 화면 관계 카드 갱신
      } catch(e) {
        errorEl.textContent = e.message || '계산 중 오류가 발생했다.';
        errorEl.classList.add('show');
      }
    });
  }

  render();
})();
</script>
</body>
</html>
